<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotação em Tempo Quase Real</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
      width: 320px;
    }
    h1 {
      margin-bottom: 20px;
      font-size: 22px;
    }
    .value {
      font-size: 28px;
      margin: 10px 0;
    }
    .updated {
      margin-top: 15px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>💱 Cotações</h1>
    <div class="value" id="usd">USD: carregando...</div>
    <div class="value" id="eur">EUR: carregando...</div>
    <div class="updated" id="updated"></div>
  </div>

<script>
  function fetchRates() {
    document.getElementById("usd").innerText = "USD: R$ 5.00";
    document.getElementById("eur").innerText = "EUR: R$ 5.50";
    document.getElementById("updated").innerText =
      "Atualizado em: " + new Date().toLocaleTimeString();
  }

  fetchRates();
  setInterval(fetchRates, 600000);
</script>
</body>
</html>
