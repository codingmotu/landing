<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotação</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
      width: 350px;
    }

    h1 {
      margin-bottom: 15px;
    }

    iframe {
      border: none;
      border-radius: 10px;
      width: 100%;
      height: 120px;
      margin-bottom: 10px;
    }

    .updated {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>💱 Cotações</h1>

    <!-- USD -->
    <iframe src="https://wise.com/br/currency-converter/usd-to-brl-rate?amount=1"></iframe>

    <!-- EUR -->
    <iframe src="https://wise.com/br/currency-converter/eur-to-brl-rate?amount=1"></iframe>

    <div class="updated" id="updated">
      Página atualiza automaticamente a cada 15 minutos
    </div>

    <button onclick="falar()">🔊 Ouvir cotação</button>
  </div>

  <script>
    function falar() {
      const texto = "A cotação do dólar e do euro está exibida na tela.";

      const speech = new SpeechSynthesisUtterance(texto);
      speech.lang = "pt-BR";

      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(speech);
    }

    // auto refresh da página a cada 15 minutos
    setTimeout(() => {
      location.reload();
    }, 900000);
  </script>
</body>
</html>
